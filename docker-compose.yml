services:
  yazio:
    build: .
    restart: unless-stopped
    environment:
      YAZIO_USERNAME: ${YAZIO_USERNAME}
      YAZIO_PASSWORD: ${YAZIO_PASSWORD}
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - yazio
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      EMAIL: ${EMAIL}
      MCP_TOKEN: ${MCP_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
