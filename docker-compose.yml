services:
  yazio:
    build: .
    restart: unless-stopped
    environment:
      YAZIO_USERNAME: ${YAZIO_USERNAME}
      YAZIO_PASSWORD: ${YAZIO_PASSWORD}
    expose:
      - "8000"

  alice:
    build: ./alice
    restart: unless-stopped
    environment:
      YAZIO_USERNAME: ${YAZIO_USERNAME}
      YAZIO_PASSWORD: ${YAZIO_PASSWORD}
      ALICE_SECRET: ${ALICE_SECRET}
      TZ: ${TZ:-Europe/Moscow}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - yazio
      - alice
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      EMAIL: ${EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
